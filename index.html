<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zentro</title>
  <link rel="icon" href="assets/circlelogo.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav id="mainNav">
    <div class="nav-left">
      <a class="logo" href="#/">
        <img src="assets/logo.png" alt="Zentro" class="logo-img">
      </a>
    </div>

    <form class="search-form" id="searchForm">
      <div id="searchIcon" class="search-icon"></div>
      <input type="text" id="searchInput" placeholder="Search movies &amp; shows…" autocomplete="off">
      <div id="searchClear" class="search-clear"></div>
    </form>

    <div class="nav-right">
      <button class="nav-link active" id="navHome">Home</button>
      <button class="nav-link" id="navLibrary">Library</button>
      <div class="nav-browse-wrap" id="browseWrap">
        <button class="nav-link nav-browse-btn" id="navBrowse">
          Browse
          <span data-icon="chevronDown" data-size="11"></span>
        </button>
        <div class="browse-dropdown" id="browseDropdown">
          <button class="browse-item" data-go="movies">
            <span data-icon="film" data-size="15"></span>
            Movies
          </button>
          <button class="browse-item" data-go="series">
            <span data-icon="tv" data-size="15"></span>
            Series
          </button>
          <button class="browse-item" data-go="live">
            <span data-icon="radio" data-size="15"></span>
            Live TV
          </button>
        </div>
      </div>
      <a class="nav-link nav-vidking" href="https://www.vidking.net/" target="_blank" rel="noopener">API <span data-icon="externalLink" data-size="10"></span></a>
    </div>
  </nav>

  <main id="app"></main>

  <script type="module" src="js/adblocker.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
